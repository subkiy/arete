<script>
  const hamburger = document.getElementById('nav-hamburger');
  const allLinks = document.querySelectorAll('.nav-links');
  hamburger.addEventListener('click', () => {
    allLinks.forEach(ul => ul.classList.toggle('nav-open'));
    hamburger.classList.toggle('nav-hamburger--open');
  });
  document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
      allLinks.forEach(ul => ul.classList.remove('nav-open'));
      hamburger.classList.remove('nav-hamburger--open');
    });
  });
</script>
