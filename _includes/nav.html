<script>
  const hamburger = document.getElementById('nav-hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  hamburger.addEventListener('click', () => {
    mobileMenu.classList.toggle('mobile-menu--open');
    hamburger.classList.toggle('nav-hamburger--open');
  });
  mobileMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      mobileMenu.classList.remove('mobile-menu--open');
      hamburger.classList.remove('nav-hamburger--open');
    });
  });

  const searchBtn = document.getElementById('nav-search-btn');
  const searchOverlay = document.getElementById('nav-search-overlay');
  const searchClose = document.getElementById('nav-search-close');
  const searchInput = document.getElementById('nav-search-input');
  if (searchBtn) {
    searchBtn.addEventListener('click', (e) => {
      e.preventDefault();
      searchOverlay.classList.add('active');
      searchInput.focus();
    });
  }
  if (searchClose) {
    searchClose.addEventListener('click', () => searchOverlay.classList.remove('active'));
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') searchOverlay.classList.remove('active');
  });
</script>
