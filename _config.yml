# ─── Site Settings ─────────────────────────────────────
title: Aretē
description: Long-form essays at the intersection of philosophy, mathematics, science, and culture.
url: "https://subkiy.github.io" # e.g. https://yourusername.github.io
baseurl: "/arete" # e.g. /logos-site if your repo is not the root

# ─── Author ─────────────────────────────────────────────
author:
  name: subkiy
  title: Student · University of Oslo
  initials: SS
  email: you@yourdomain.com
  twitter: "@subkiyyy"

